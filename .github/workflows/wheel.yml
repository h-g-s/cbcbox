name: cibuildwheel

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish wheels to PyPI: (testpypi/pypi/none)'
        required: false
        type: choice
        options:
          - testpypi
          - pypi
          - none
        default: none
          

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
          - os: macos-15
            arch: arm64
          - os: macos-15-intel
            arch: x86_64
          - os: windows-latest
            arch: AMD64

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for Linux aarch64 emulation)
        if: matrix.os == 'ubuntu-latest' && matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      # Refresh MSYS2 package database and install the MinGW64 toolchain before
      # cibuildwheel runs. Doing this as a dedicated step (rather than inside
      # CIBW_BEFORE_ALL_WINDOWS) gives clearer error messages and avoids mirror
      # failures caused by a stale pacman database.
      - name: Set up MSYS2 toolchain (Windows)
        if: matrix.os == 'windows-latest'
        shell: C:\msys64\usr\bin\bash.exe -l {0}
        run: |
          pacman -Sy --noconfirm
          pacman -S --needed --noconfirm \
            mingw-w64-x86_64-gcc \
            mingw-w64-x86_64-gcc-fortran \
            make \
            autoconf automake libtool pkg-config

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBW_BUILD: "cp313-* pp3*-*"
          CIBW_SKIP: "*musllinux*"
          CIBW_ARCHS: "${{ matrix.arch }}"
          CIBW_MANYLINUX_X86_64_IMAGE: "quay.io/pypa/manylinux2014_x86_64"
          CIBW_MANYLINUX_AARCH64_IMAGE: "quay.io/pypa/manylinux2014_aarch64"
          # gfortran: needed to build OpenBLAS with full LAPACK support.
          # patchelf: used by bundle_dynamic_deps to set $ORIGIN rpaths and
          #           read ELF sonames of bundled libs (libgfortran, etc.).
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y gcc-gfortran &&
            pip install patchelf
          # gfortran ships with the pre-installed Xcode / GCC on macOS runners.
          # Install it explicitly only if somehow absent.
          CIBW_BEFORE_ALL_MACOS: >
            which gfortran || brew install gcc
          # Toolchain already installed in the "Set up MSYS2 toolchain" step above.
          CIBW_BEFORE_ALL_WINDOWS: ""
          # On Linux, cibuildwheel runs tests inside Docker; /output is the only
          # bind-mounted dir visible on the host.  Tell conftest.py to write
          # perf reports there so they can be uploaded as CI artifacts.
          CIBW_ENVIRONMENT_LINUX: "PERF_REPORT_DIR=/output"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: ""
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: ""
          # DLL bundling is done by setup.py; skip delocate/delvewheel.
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: ""
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "pytest {package}/tests/ -v"
        with:
          package-dir: .
          output-dir: wheelhouse
          config-file: "{package}/pyproject.toml"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ runner.os }}-${{ runner.arch }}
          path: ./wheelhouse/*.whl

      - name: Copy Linux perf reports from wheelhouse to tests/
        if: runner.os == 'Linux'
        run: |
          cp wheelhouse/perf_report.json tests/ 2>/dev/null || true
          cp wheelhouse/perf_report.md   tests/ 2>/dev/null || true

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            tests/perf_report.md
            tests/perf_report.json

  combine_reports:
    name: Combine performance reports
    needs: build_wheels
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download all performance reports
        uses: actions/download-artifact@v4
        with:
          pattern: perf-report-*
          path: perf_reports/

      - name: Generate combined report
        run: python3 .github/scripts/combine_perf_reports.py perf_reports perf_report_combined.md

      - name: Upload combined report
        uses: actions/upload-artifact@v4
        with:
          name: perf-report-combined
          path: perf_report_combined.md

  publish-to-testpypi:
    name: Publish Python wheels to TestPyPI
    needs:
    - build_wheels
    runs-on: ubuntu-latest
    if: github.event.inputs.publish == 'testpypi'

    environment:
      name: testpypi
      url: https://test.pypi.org/p/cbcbox

    permissions:
      id-token: write

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        pattern: cibw-wheels-*
        merge-multiple: true
        path: dist/
    - name: List all the dists
      run: ls -l dist/
    - name: Publish distribution to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: Publish Python wheels to PyPI
    needs:
    - build_wheels
    runs-on: ubuntu-latest
    if: github.event.inputs.publish == 'pypi'

    environment:
      name: pypi
      url: https://pypi.org/project/cbcbox

    permissions:
      id-token: write

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        pattern: cibw-wheels-*
        merge-multiple: true
        path: dist/
    - name: List all the dists
      run: ls -l dist/
    - name: Publish distribution to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://upload.pypi.org/legacy/
