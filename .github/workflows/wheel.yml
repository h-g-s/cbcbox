name: cibuildwheel

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish wheels to PyPI: (testpypi/pypi/none)'
        required: false
        type: choice
        options:
          - testpypi
          - pypi
          - none
        default: none
          

jobs:

  # ── ARM64 platforms: single job each (no AVX2 variant) ──────────────────────
  build_wheels_arm:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04-arm
            arch: aarch64
          - os: macos-15
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBW_BUILD: "cp313-* pp3*-*"
          CIBW_SKIP: "*musllinux*"
          CIBW_ARCHS: "${{ matrix.arch }}"
          CIBW_MANYLINUX_AARCH64_IMAGE: "quay.io/pypa/manylinux2014_aarch64"
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y gcc-gfortran &&
            pip install patchelf
          CIBW_BEFORE_ALL_MACOS: >
            which gfortran || brew install gcc
          CIBW_ENVIRONMENT_LINUX: "PERF_REPORT_DIR=/output"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: ""
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: ""
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "pytest {package}/tests/ -v"
        with:
          package-dir: .
          output-dir: wheelhouse
          config-file: "{package}/pyproject.toml"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ runner.os }}-${{ runner.arch }}
          path: ./wheelhouse/*.whl

      - name: Copy Linux perf reports from wheelhouse to tests/
        if: runner.os == 'Linux'
        run: |
          cp wheelhouse/perf_report.json tests/ 2>/dev/null || true
          cp wheelhouse/perf_report.md   tests/ 2>/dev/null || true

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            tests/perf_report.md
            tests/perf_report.json

  # ── Linux x86_64 ─────────────────────────────────────────────────────────────
  # Both variants are compiled inside the manylinux2014 container so the
  # resulting binaries are ABI-compatible with any manylinux2014+ distro.
  # Using cp313 Python from the image ensures all setup.py features work.

  compile-linux-x64-generic:
    name: Compile Linux x86_64 generic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build generic binary (manylinux2014)
        run: |
          docker run --rm \
            -v "$PWD:/project" \
            -e CBCBOX_BUILD_VARIANT=generic \
            -e CBCBOX_BUILD_ONLY=1 \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -c 'export PATH=/opt/python/cp313-cp313/bin:$PATH &&
                     yum install -y gcc-gfortran &&
                     pip install setuptools wheel patchelf &&
                     cd /project &&
                     python setup.py build_ext'
          sudo chown -R "$USER:$USER" cbc_dist/ 2>/dev/null || true
          tar -czf cbc_dist_generic.tar.gz cbc_dist/
      - uses: actions/upload-artifact@v4
        with:
          name: cbc-dist-linux-x64-generic
          path: cbc_dist_generic.tar.gz

  compile-linux-x64-avx2:
    name: Compile Linux x86_64 AVX2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build AVX2 binary (manylinux2014)
        run: |
          docker run --rm \
            -v "$PWD:/project" \
            -e CBCBOX_BUILD_VARIANT=avx2 \
            -e CBCBOX_BUILD_ONLY=1 \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -c 'export PATH=/opt/python/cp313-cp313/bin:$PATH &&
                     yum install -y gcc-gfortran &&
                     pip install setuptools wheel patchelf &&
                     cd /project &&
                     python setup.py build_ext'
          sudo chown -R "$USER:$USER" cbc_dist_avx2/ 2>/dev/null || true
          tar -czf cbc_dist_avx2.tar.gz cbc_dist_avx2/
      - uses: actions/upload-artifact@v4
        with:
          name: cbc-dist-linux-x64-avx2
          path: cbc_dist_avx2.tar.gz

  package-linux-x64:
    name: Package Linux x86_64 wheel
    needs: [compile-linux-x64-generic, compile-linux-x64-avx2]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cbc-dist-linux-x64-generic
          path: .
      - run: tar -xzf cbc_dist_generic.tar.gz
      - uses: actions/download-artifact@v4
        with:
          name: cbc-dist-linux-x64-avx2
          path: .
      - run: tar -xzf cbc_dist_avx2.tar.gz
      - name: Build and test wheel (compilation skipped — binaries pre-built)
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBW_BUILD: "cp313-* pp3*-*"
          CIBW_SKIP: "*musllinux*"
          CIBW_ARCHS: "x86_64"
          CIBW_MANYLINUX_X86_64_IMAGE: "quay.io/pypa/manylinux2014_x86_64"
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y gcc-gfortran &&
            pip install patchelf
          CIBW_ENVIRONMENT_LINUX: "PERF_REPORT_DIR=/output"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: ""
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "pytest {package}/tests/ -v"
        with:
          package-dir: .
          output-dir: wheelhouse
          config-file: "{package}/pyproject.toml"
      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-Linux-X64
          path: ./wheelhouse/*.whl
      - name: Copy Linux perf reports from wheelhouse to tests/
        run: |
          cp wheelhouse/perf_report.json tests/ 2>/dev/null || true
          cp wheelhouse/perf_report.md   tests/ 2>/dev/null || true
      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report-ubuntu-latest-x86_64
          path: |
            tests/perf_report.md
            tests/perf_report.json

  # ── macOS Intel (x86_64) ─────────────────────────────────────────────────────

  compile-macos-intel-generic:
    name: Compile macOS Intel generic
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - name: Install gfortran if needed
        run: which gfortran || brew install gcc
      - name: Build generic binary
        env:
          CBCBOX_BUILD_VARIANT: generic
          CBCBOX_BUILD_ONLY: "1"
        run: python setup.py build_ext
      - run: tar -czf cbc_dist_generic.tar.gz cbc_dist/
      - uses: actions/upload-artifact@v4
        with:
          name: cbc-dist-macos-intel-generic
          path: cbc_dist_generic.tar.gz

  compile-macos-intel-avx2:
    name: Compile macOS Intel AVX2
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - name: Install gfortran if needed
        run: which gfortran || brew install gcc
      - name: Build AVX2 binary
        env:
          CBCBOX_BUILD_VARIANT: avx2
          CBCBOX_BUILD_ONLY: "1"
        run: python setup.py build_ext
      - run: tar -czf cbc_dist_avx2.tar.gz cbc_dist_avx2/
      - uses: actions/upload-artifact@v4
        with:
          name: cbc-dist-macos-intel-avx2
          path: cbc_dist_avx2.tar.gz

  package-macos-intel:
    name: Package macOS Intel wheel
    needs: [compile-macos-intel-generic, compile-macos-intel-avx2]
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: cbc-dist-macos-intel-generic
          path: .
      - run: tar -xzf cbc_dist_generic.tar.gz
      - uses: actions/download-artifact@v4
        with:
          name: cbc-dist-macos-intel-avx2
          path: .
      - run: tar -xzf cbc_dist_avx2.tar.gz
      - name: Build and test wheel (compilation skipped — binaries pre-built)
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBW_BUILD: "cp313-* pp3*-*"
          CIBW_ARCHS: "x86_64"
          CIBW_BEFORE_ALL_MACOS: >
            which gfortran || brew install gcc
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: ""
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "pytest {package}/tests/ -v"
        with:
          package-dir: .
          output-dir: wheelhouse
          config-file: "{package}/pyproject.toml"
      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-macOS-X64
          path: ./wheelhouse/*.whl
      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report-macos-15-intel-x86_64
          path: |
            tests/perf_report.md
            tests/perf_report.json

  # ── Windows (AMD64) ───────────────────────────────────────────────────────────

  compile-windows-generic:
    name: Compile Windows generic
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up MSYS2 toolchain
        shell: C:\msys64\usr\bin\bash.exe -l {0}
        run: |
          pacman -Sy --noconfirm
          pacman -S --needed --noconfirm \
            mingw-w64-x86_64-gcc \
            mingw-w64-x86_64-gcc-fortran \
            make \
            autoconf automake libtool pkg-config
      - name: Build generic binary
        env:
          CBCBOX_BUILD_VARIANT: generic
          CBCBOX_BUILD_ONLY: "1"
        run: python setup.py build_ext
      - run: tar -czf cbc_dist_generic.tar.gz cbc_dist/
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: cbc-dist-windows-generic
          path: cbc_dist_generic.tar.gz

  compile-windows-avx2:
    name: Compile Windows AVX2
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up MSYS2 toolchain
        shell: C:\msys64\usr\bin\bash.exe -l {0}
        run: |
          pacman -Sy --noconfirm
          pacman -S --needed --noconfirm \
            mingw-w64-x86_64-gcc \
            mingw-w64-x86_64-gcc-fortran \
            make \
            autoconf automake libtool pkg-config
      - name: Build AVX2 binary
        env:
          CBCBOX_BUILD_VARIANT: avx2
          CBCBOX_BUILD_ONLY: "1"
        run: python setup.py build_ext
      - run: tar -czf cbc_dist_avx2.tar.gz cbc_dist_avx2/
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: cbc-dist-windows-avx2
          path: cbc_dist_avx2.tar.gz

  package-windows:
    name: Package Windows wheel
    needs: [compile-windows-generic, compile-windows-avx2]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up MSYS2 toolchain
        shell: C:\msys64\usr\bin\bash.exe -l {0}
        run: |
          pacman -Sy --noconfirm
          pacman -S --needed --noconfirm \
            mingw-w64-x86_64-gcc \
            mingw-w64-x86_64-gcc-fortran \
            make \
            autoconf automake libtool pkg-config
      - uses: actions/download-artifact@v4
        with:
          name: cbc-dist-windows-generic
          path: .
      - run: tar -xzf cbc_dist_generic.tar.gz
        shell: bash
      - uses: actions/download-artifact@v4
        with:
          name: cbc-dist-windows-avx2
          path: .
      - run: tar -xzf cbc_dist_avx2.tar.gz
        shell: bash
      - name: Build and test wheel (compilation skipped — binaries pre-built)
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBW_BUILD: "cp313-* pp3*-*"
          CIBW_ARCHS: "AMD64"
          CIBW_BEFORE_ALL_WINDOWS: ""
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: ""
          CIBW_TEST_REQUIRES: "pytest"
          CIBW_TEST_COMMAND: "pytest {package}/tests/ -v"
        with:
          package-dir: .
          output-dir: wheelhouse
          config-file: "{package}/pyproject.toml"
      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-Windows-AMD64
          path: ./wheelhouse/*.whl
      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report-windows-latest-AMD64
          path: |
            tests/perf_report.md
            tests/perf_report.json

  # ── Combine performance reports ───────────────────────────────────────────────

  combine_reports:
    name: Combine performance reports
    needs:
      - build_wheels_arm
      - package-linux-x64
      - package-macos-intel
      - package-windows
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all performance reports
        uses: actions/download-artifact@v4
        with:
          pattern: perf-report-*
          path: perf_reports/

      - name: Generate combined report and update README
        run: python3 .github/scripts/combine_perf_reports.py perf_reports perf_report_combined.md README.md

      - name: Upload combined report
        uses: actions/upload-artifact@v4
        with:
          name: perf-report-combined
          path: perf_report_combined.md

      - name: Commit and push README update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet && echo "README unchanged" || \
            (git commit -m "docs: update performance results [skip ci]" && git push)

  # ── Publish ───────────────────────────────────────────────────────────────────

  publish-to-testpypi:
    name: Publish Python wheels to TestPyPI
    needs:
      - build_wheels_arm
      - package-linux-x64
      - package-macos-intel
      - package-windows
    runs-on: ubuntu-latest
    if: github.event.inputs.publish == 'testpypi'

    environment:
      name: testpypi
      url: https://test.pypi.org/p/cbcbox

    permissions:
      id-token: write

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        pattern: cibw-wheels-*
        merge-multiple: true
        path: dist/
    - name: List all the dists
      run: ls -l dist/
    - name: Publish distribution to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: Publish Python wheels to PyPI
    needs:
      - build_wheels_arm
      - package-linux-x64
      - package-macos-intel
      - package-windows
    runs-on: ubuntu-latest
    if: github.event.inputs.publish == 'pypi'

    environment:
      name: pypi
      url: https://pypi.org/project/cbcbox

    permissions:
      id-token: write

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        pattern: cibw-wheels-*
        merge-multiple: true
        path: dist/
    - name: List all the dists
      run: ls -l dist/
    - name: Publish distribution to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://upload.pypi.org/legacy/

